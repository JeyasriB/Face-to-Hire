<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FacetoHire - Login/Register</title>
   
  </head>
  <style>
    /* ================= General Reset ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    /* ================= Login Page ================= */
    .login-body {
      background:url("images/pic1.jpg") no-repeat center center fixed;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-size: cover;        /* make it cover full screen */
      background-repeat: no-repeat;  /* no repeat */
      min-height: 100vh;             /* full viewport height */
      color: #fff;                   /* ✅ visible white text */
      position: relative;
      }

    .login-container {
      background: rgba(255, 255, 255, 0.39);
      padding: 25px 30px;
      border-radius: 12px;
      text-align: center;
      width: 340px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .login-container h1 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #007bff;
    }

    .login-container input,
    .login-container select {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-toggle {
      margin-bottom: 15px;
    }

    .form-toggle button {
      padding: 8px 15px;
      margin: 0 5px;
      border: none;
      background: #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .form-toggle .active {
      background: #007bff;
      color: white;
    }

    .btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #0056b3;
    }
  </style>
  <body class="login-body">
    <div class="login-container">
      <h1>FacetoHire</h1>
      <div class="form-toggle">
        <button onclick="showForm('login')" class="active">Login</button>
        <button onclick="showForm('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" action="login.php" method="POST">
        <input type="email" name="email" placeholder="Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit" class="btn">Login</button>
      </form>

      <!-- Register Form -->
      <form
        id="register-form"
        action="register.php"
        method="POST"
        style="display: none"
      >
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit" class="btn">Register</button>
      </form>
    </div>

    <script>
      function showForm(type) {
        document.getElementById("login-form").style.display =
          type === "login" ? "block" : "none";
        document.getElementById("register-form").style.display =
          type === "register" ? "block" : "none";
        document
          .querySelectorAll(".form-toggle button")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");
      }
    </script>
  </body>
</html>
